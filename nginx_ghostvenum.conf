# nginx Reverse Proxy Konfiguration für GhostVenumAI Enterprise
# Datei kopieren nach: /etc/nginx/sites-available/ghostvenum
# Dann: sudo ln -s /etc/nginx/sites-available/ghostvenum /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;
    # HTTP → HTTPS Weiterleitung
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # SSL-Zertifikat (self-signed, erstellt durch setup_https.sh)
    ssl_certificate     /etc/ssl/ghostvenum/ghostvenum.crt;
    ssl_certificate_key /etc/ssl/ghostvenum/ghostvenum.key;

    # Nur sichere TLS-Versionen (BSI TR-02102)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers (BSI APP.3.1, ISO 27001 A.8.7)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Zugriff nur aus lokalem Netz (Heimnetz/Firmennetz)
    # Passe den IP-Bereich an dein Netzwerk an:
    allow 127.0.0.1;
    allow 192.168.0.0/16;
    allow 10.0.0.0/8;
    deny all;

    # Proxy zu Flask
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE / Streaming (Monitor-Tab)
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # Statische Dateien direkt über nginx (schneller)
    location /static/ {
        alias /home/serverserver/Desktop/ghostvenumaiagents/static/;
        expires 1d;
        add_header Cache-Control "public";
    }

    # Log
    access_log /var/log/nginx/ghostvenum_access.log;
    error_log  /var/log/nginx/ghostvenum_error.log;
}
